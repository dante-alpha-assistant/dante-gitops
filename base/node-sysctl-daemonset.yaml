apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-sysctl-tuner
  namespace: kube-system
  labels:
    app: node-sysctl-tuner
spec:
  selector:
    matchLabels:
      app: node-sysctl-tuner
  template:
    metadata:
      labels:
        app: node-sysctl-tuner
    spec:
      hostPID: true
      initContainers:
        - name: sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              sysctl -w fs.inotify.max_user_instances=512
              sysctl -w fs.inotify.max_user_watches=524288
              echo "sysctl tuning applied"
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 1m
              memory: 4Mi
      tolerations:
        - operator: Exists
