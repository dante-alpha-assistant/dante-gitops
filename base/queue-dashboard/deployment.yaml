apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-dashboard
  annotations:
    deploy/commit: "02cedabab4952382dffca899676be2044e971dfc"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue-dashboard
  template:
    metadata:
      labels:
        app: queue-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/dante-alpha-assistant/queue-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: queue-dashboard-env
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: SUPABASE_MGMT_TOKEN
              value: "sbp_1bba539cc0f681dba9fd333d4dc1fbdb3b9db972"
            - name: SUPABASE_PROJECT_ID
              value: "lessxkxujvcmublgwdaa"
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: queue-dashboard-env
                  key: GH_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      imagePullSecrets:
        - name: ghcr-secret
