# SealedSecret for secrets-sealer credentials
# Values must be sealed with: kubeseal --controller-name=sealed-secrets --controller-namespace=kube-system
# 
# To seal: POST /seal to this service itself (bootstrapping requires manual first seal)
# Manual seal example:
#   echo -n "your-token" | kubectl create secret generic secrets-sealer-env \
#     --namespace=infra \
#     --from-literal=SEALER_TOKEN=$(cat /dev/stdin) \
#     --from-literal=GH_TOKEN=ghp_... \
#     --dry-run=client -o yaml | kubeseal --format yaml > sealed-secret.yaml
#
# PLACEHOLDER — must be populated before deployment
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: secrets-sealer-env
  namespace: infra
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # SEAL THESE VALUES BEFORE DEPLOYING
    # SEALER_TOKEN: <sealed-value>
    # GH_TOKEN: <sealed-value>
    SEALER_TOKEN: PLACEHOLDER_SEAL_ME
    GH_TOKEN: PLACEHOLDER_SEAL_ME
  template:
    metadata:
      name: secrets-sealer-env
      namespace: infra
