apiVersion: v1
kind: ConfigMap
metadata:
  name: neo-config
  namespace: agents
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "mode": "local",
        "bind": "lan",
        "tools": {
          "allow": ["sessions_spawn", "sessions_send", "sessions_list", "sessions_history", "session_status", "cron"]
        }
      },
      "agents": {
        "defaults": {
          "model": { "primary": "anthropic/claude-opus-4-6" },
          "thinking": "high",
          "workspace": "/root/.openclaw/workspace",
          "compaction": { "mode": "safeguard" },
          "maxConcurrent": 4,
          "subagents": { "maxConcurrent": 8 }
        }
      },
      "tools": {
        "sessions": { "visibility": "all" }
      },
      "plugins": {
        "allow": ["diagnostics-otel"],
        "entries": { "diagnostics-otel": { "enabled": true } }
      },
      "diagnostics": {
        "enabled": true,
        "otel": {
          "enabled": true,
          "endpoint": "https://cloud.langfuse.com/api/public/otel",
          "protocol": "http/protobuf",
          "serviceName": "neo",
          "traces": true,
          "metrics": true,
          "logs": false,
          "sampleRate": 1.0,
          "flushIntervalMs": 30000
        }
      }
    }
