apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo
  namespace: agents
  labels:
    app: neo
    role: agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo
  template:
    metadata:
      labels:
        app: neo
        role: agent
      annotations:
        secret.reloader.stakater.com/reload: neo-env
    spec:
      initContainers:
      - name: init-tools
        image: debian:bookworm-slim
        command:
        - /bin/bash
        - -c
        args:
        - "set -e\napt-get update -qq && apt-get install -y -qq curl ca-certificates\
          \ openssh-client > /dev/null 2>&1\nKUBE_VER=v1.31.0\ncurl -sL \"https://dl.k8s.io/release/${KUBE_VER}/bin/linux/amd64/kubectl\"\
          \ -o /tools/kubectl\nchmod +x /tools/kubectl\necho \"kubectl ${KUBE_VER}\
          \ installed\"\n# SSH key persistence on PVC\nSSH_DIR=/pvc/.ssh\nmkdir -p\
          \ \"$SSH_DIR\"\nif [ ! -f \"$SSH_DIR/id_ed25519\" ]; then\n  echo \"Generating\
          \ new SSH key pair on PVC...\"\n  ssh-keygen -t ed25519 -f \"$SSH_DIR/id_ed25519\"\
          \ -N \"\" -q\n  echo \"SSH key generated\"\nelse\n  echo \"SSH key already\
          \ exists on PVC, reusing\"\nfi\n# Scan GitHub + K8s host keys and merge\
          \ with PVC known_hosts\nssh-keyscan github.com 167.235.61.168 >> \"$SSH_DIR/known_hosts\"\
          \ 2>/dev/null\n# Also merge from secret if available\nif [ -f /ssh-in/known_hosts\
          \ ]; then\n  cat /ssh-in/known_hosts >> \"$SSH_DIR/known_hosts\"\nfi\n#\
          \ Deduplicate\nsort -u \"$SSH_DIR/known_hosts\" -o \"$SSH_DIR/known_hosts\"\
          \n# Ensure correct permissions\nchmod 700 \"$SSH_DIR\"\nchmod 600 \"$SSH_DIR/id_ed25519\"\
          \nchmod 644 \"$SSH_DIR/id_ed25519.pub\"\n[ -f \"$SSH_DIR/known_hosts\" ]\
          \ && chmod 644 \"$SSH_DIR/known_hosts\"\n# Copy to ssh-out for main container\
          \ mount\nmkdir -p /ssh-out\ncp \"$SSH_DIR/id_ed25519\" /ssh-out/id_ed25519\n\
          cp \"$SSH_DIR/id_ed25519.pub\" /ssh-out/id_ed25519.pub\n[ -f \"$SSH_DIR/known_hosts\"\
          \ ] && cp \"$SSH_DIR/known_hosts\" /ssh-out/known_hosts\nchmod 600 /ssh-out/id_ed25519\n\
          chmod 644 /ssh-out/id_ed25519.pub\n[ -f /ssh-out/known_hosts ] && chmod\
          \ 644 /ssh-out/known_hosts\necho \"SSH keys installed from PVC\"\n"
        volumeMounts:
        - name: tools-bin
          mountPath: /tools
        - name: data
          mountPath: /pvc
        - name: ssh-keys
          mountPath: /ssh-in
          readOnly: true
        - name: ssh-out
          mountPath: /ssh-out
      - name: init-config
        image: node:22-bookworm-slim
        command:
        - node
        - -e
        args:
        - "const fs = require('fs');\nconst e = process.env;\nconst config = {\n \
          \ gateway: {\n    port: 18789,\n    mode: \"local\",\n    bind: \"lan\"\
          ,\n    auth: { mode: \"token\", token: e.OPENCLAW_GATEWAY_TOKEN || \"\"\
          \ },\n    tools: { allow: [\"sessions_spawn\",\"sessions_send\",\"sessions_list\"\
          ,\"sessions_history\",\"session_status\",\"cron\"] },\n    controlUi: {\
          \ dangerouslyAllowHostHeaderOriginFallback: true },\n    http: { endpoints:\
          \ { chatCompletions: { enabled: true } } }\n  },\n  channels: {\n    discord:\
          \ {\n      enabled: true,\n      token: e.DISCORD_TOKEN || \"\",\n     \
          \ groupPolicy: \"open\",\n      dmPolicy: \"pairing\",\n      allowBots:\
          \ true\n    }\n  },\n  models: {\n    providers: {\n      anthropic: {\n\
          \        baseUrl: \"https://api.anthropic.com\",\n        models: [{ id:\
          \ \"claude-opus-4-6\", name: \"claude-opus-4-6\", api: \"anthropic-messages\"\
          , reasoning: true, input: [\"text\",\"image\"], cost: { input: 0, output:\
          \ 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 200000, maxTokens: 16384\
          \ }]\n      },\n      openrouter: {\n        baseUrl: \"https://openrouter.ai/api/v1\"\
          ,\n        apiKey: e.OPENROUTER_API_KEY || \"\",\n        models: [\n  \
          \        { id: \"google/gemini-3-pro-preview\", name: \"gemini-3-pro-preview\"\
          , api: \"openai-completions\", reasoning: false, input: [\"text\",\"image\"\
          ], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow:\
          \ 1048576, maxTokens: 8192 },\n          { id: \"moonshotai/kimi-k2.5\"\
          , name: \"kimi-k2.5\", api: \"openai-completions\", reasoning: true, input:\
          \ [\"text\",\"image\"], cost: { input: 0.45, output: 2.25, cacheRead: 0.07,\
          \ cacheWrite: 0 }, contextWindow: 262144, maxTokens: 8192 },\n        ]\n\
          \      },\n      openai: {\n        baseUrl: \"https://api.openai.com/v1\"\
          ,\n        apiKey: e.OPENAI_API_KEY || \"\",\n        auth: \"api-key\"\
          ,\n        api: \"openai-responses\",\n        models: [\n          { id:\
          \ \"gpt-5.2\", name: \"gpt-5.2\", api: \"openai-responses\", reasoning:\
          \ true, input: [\"text\",\"image\"], cost: { input: 0, output: 0, cacheRead:\
          \ 0, cacheWrite: 0 }, contextWindow: 400000, maxTokens: 8192 },\n      \
          \    { id: \"gpt-5.2-codex\", name: \"gpt-5.2-codex\", api: \"openai-responses\"\
          , reasoning: true, input: [\"text\"], cost: { input: 0, output: 0, cacheRead:\
          \ 0, cacheWrite: 0 }, contextWindow: 400000, maxTokens: 16384 }\n      \
          \  ]\n      }\n    }\n  },\n  agents: {\n    defaults: {\n      model: {\
          \ primary: \"anthropic/claude-opus-4-6\" },\n      workspace: \"/root/.openclaw/workspace\"\
          ,\n      compaction: { mode: \"safeguard\" },\n      maxConcurrent: 4,\n      sandbox: { browser: { enabled: true, headless: true } },\n\
          \      subagents: { maxConcurrent: 8 }\n    }\n  },\n  hooks: { enabled:\
          \ true, token: \"neo-hooks-tok-2026\", allowRequestSessionKey: true, defaultSessionKey:\
          \ \"hook:default\", allowedSessionKeyPrefixes: [\"hook:\"] },\n  tools:\
          \ { sessions: { visibility: \"all\" } }\n};\nfs.mkdirSync('/root/.openclaw/workspace',\
          \ { recursive: true });\nfs.mkdirSync('/root/.openclaw/skills', { recursive:\
          \ true });\nfs.writeFileSync('/root/.openclaw/openclaw.json', JSON.stringify(config,\
          \ null, 2));\n\n// --- Write auth-profiles.json from env var (gitops-managed)\
          \ ---\nconst authDir = '/root/.openclaw/agents/main/agent';\nconst authPath\
          \ = authDir + '/auth-profiles.json';\nfs.mkdirSync(authDir, { recursive:\
          \ true });\nconst apiKey = e.ANTHROPIC_API_KEY || process.env.ANTHROPIC_API_KEY\
          \ || '';\nif (apiKey) {\n  let existing = {};\n  try { existing = JSON.parse(fs.readFileSync(authPath,\
          \ 'utf8')); } catch(_) {}\n  existing.version = 1;\n  existing.profiles\
          \ = existing.profiles || {};\n  const isOAuth = apiKey.startsWith('sk-ant-oat01-');\n\
          \  existing.profiles['anthropic:default'] = isOAuth\n    ? { type: 'oauth',\
          \ provider: 'anthropic', access: apiKey }\n    : { type: 'api_key', provider:\
          \ 'anthropic', key: apiKey };\n  existing.lastGood = existing.lastGood ||\
          \ {};\n  existing.lastGood.anthropic = 'anthropic:default';\n  fs.writeFileSync(authPath,\
          \ JSON.stringify(existing, null, 2));\n  console.log('auth-profiles.json\
          \ written from ANTHROPIC_API_KEY');\n}\nconsole.log('Config written OK');\n"
        envFrom:
        - secretRef:
            name: neo-env
        volumeMounts:
        - name: data
          mountPath: /root/.openclaw
      containers:
      - name: openclaw
        image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
        ports:
        - containerPort: 18789
        envFrom:
        - secretRef:
            name: neo-env
        env:
        - name: PATH
          value: /tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: neo-env
              key: ANTHROPIC_API_KEY
        volumeMounts:
        - name: data
          mountPath: /root/.openclaw
        - name: tools-bin
          mountPath: /tools
          readOnly: true
        - name: ssh-out
          mountPath: /root/.ssh
          readOnly: true
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          tcpSocket:
            port: 18789
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          tcpSocket:
            port: 18789
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: neo-data
      - name: tools-bin
        emptyDir: {}
      - name: ssh-keys
        secret:
          secretName: neo-ssh
          defaultMode: 384
      - name: ssh-out
        emptyDir: {}
      imagePullSecrets:
      - name: ghcr-secret
