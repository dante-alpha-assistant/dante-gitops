---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: setup-agent
  namespace: agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: setup-agent-role
rules:
  # Secrets management (create, read, update sealed secrets)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # SealedSecrets
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "create", "update", "patch"]
  # Deployments (for rollout restart after credential rotation)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  # Pods (for verification)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
  # Services (for endpoint verification)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: setup-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: setup-agent-role
subjects:
  - kind: ServiceAccount
    name: setup-agent
    namespace: agents
