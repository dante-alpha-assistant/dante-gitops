apiVersion: apps/v1
kind: Deployment
metadata:
  name: setup-agent
  namespace: agents
  labels:
    app: setup-agent
    role: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: setup-agent
  template:
    metadata:
      labels:
        app: setup-agent
        role: worker
      annotations:
        config/restart-trigger: "2026-03-18-kimi-model"
    spec:
      initContainers:
        - name: init-config
          image: node:22-bookworm-slim
          command: ["sh", "-c"]
          args:
            - |
              # Install js-yaml for config parsing
              npm install -g js-yaml
              # Run the init script from configmap
              node /init/init.js
          volumeMounts:
            - name: init-config
              mountPath: /init
            - name: data
              mountPath: /root/.openclaw
          envFrom:
            - secretRef:
                name: setup-agent-env
      containers:
        - name: openclaw
          image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 18789
          envFrom:
            - secretRef:
                name: setup-agent-env
          volumeMounts:
            - name: data
              mountPath: /root/.openclaw
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: setup-agent-data
        - name: init-config
          configMap:
            name: setup-agent-init
            defaultMode: 0755
      imagePullSecrets:
        - name: ghcr-secret