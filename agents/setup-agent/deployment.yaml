apiVersion: apps/v1
kind: Deployment
metadata:
  name: setup-agent
  namespace: agents
  labels:
    app: setup-agent
    role: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: setup-agent
  template:
    metadata:
      labels:
        app: setup-agent
        role: worker
      annotations:
        config/restart-trigger: "2026-03-18-kimi-model"
    spec:
      serviceAccountName: setup-agent
      initContainers:
        - name: init-config
          image: node:22-bookworm-slim
          command: ["node", "/init/init.js"]
          volumeMounts:
            - name: init-config
              mountPath: /init
            - name: data
              mountPath: /root/.openclaw
          envFrom:
            - secretRef:
                name: setup-agent-env
        # Install kubectl and kubeseal for credential sealing
        - name: install-tools
          image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
          command: ["sh", "-c"]
          args:
            - |
              set -e
              apt-get update -qq && apt-get install -y -qq curl >/dev/null 2>&1
              # Install kubectl
              curl -sLo /tools/kubectl "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x /tools/kubectl
              # Install kubeseal
              KUBESEAL_VERSION=$(curl -s https://api.github.com/repos/bitnami-labs/sealed-secrets/releases/latest | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
              curl -sLo /tools/kubeseal "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz" | tar -xz -C /tools kubeseal 2>/dev/null || \
                (curl -sLo /tmp/kubeseal.tar.gz "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz" && tar -xzf /tmp/kubeseal.tar.gz -C /tools kubeseal)
              chmod +x /tools/kubeseal
              echo "Tools installed: kubectl=$(ls -la /tools/kubectl) kubeseal=$(ls -la /tools/kubeseal)"
          volumeMounts:
            - name: tools
              mountPath: /tools
      containers:
        - name: openclaw
          image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 18789
          env:
            - name: PATH
              value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          envFrom:
            - secretRef:
                name: setup-agent-env
          volumeMounts:
            - name: data
              mountPath: /root/.openclaw
            - name: tools
              mountPath: /tools
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: setup-agent-data
        - name: init-config
          configMap:
            name: setup-agent-init
            defaultMode: 0755
        - name: tools
          emptyDir: {}
      imagePullSecrets:
        - name: ghcr-secret