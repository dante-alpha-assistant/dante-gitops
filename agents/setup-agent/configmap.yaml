apiVersion: v1
kind: ConfigMap
metadata:
  name: setup-agent-init
  namespace: agents
data:
  init.js: |
    const fs = require('fs');
    const path = require('path');

    console.log('=== setup-agent init config ===');

    // Ensure directories exist
    fs.mkdirSync('/root/.openclaw/workspace', { recursive: true });
    fs.mkdirSync('/root/.openclaw/workspace/skills', { recursive: true });
    fs.mkdirSync('/root/.openclaw/workspace/credentials', { recursive: true });

    // Write gateway.yaml (kimi model via OpenRouter)
    const gatewayConfig = {
      models: {
        providers: {
          'openrouter': {
            url: 'https://openrouter.ai/api/v1/chat/completions',
            headers: {
              'HTTP-Referer': 'https://openclaw.ai',
              'X-Title': 'OpenClaw'
            }
          }
        },
        default: 'openrouter/openai/gpt-5.4-hybrid',
        aliases: {
          'default': 'openrouter/openai/gpt-5.4-hybrid',
          'kimi': 'openrouter/moonshotai/kimi-k2.5'
        }
      },
      tools: {
        allow: ['sessions_spawn', 'sessions_send']
      },
      channels: {
        telegram: { enabled: false }
      }
    };
    fs.writeFileSync('/root/.openclaw/gateway.yaml', require('js-yaml').dump(gatewayConfig));

    // Write auth-profiles.json
    const authProfiles = {
      'openrouter:default': {
        type: 'token',
        token: process.env.OPENROUTER_API_KEY
      },
      'anthropic:default': {
        type: 'oauth',
        client_id: 'claude-cli-f6e4f0ad-5eac-4821-9f5e-2dc53b40ee4b',
        access_token: process.env.ANTHROPIC_API_KEY,
        refresh_token: process.env.ANTHROPIC_REFRESH_TOKEN,
        expires_at: parseInt(process.env.ANTHROPIC_TOKEN_EXPIRES || '0')
      }
    };
    fs.writeFileSync('/root/.openclaw/auth-profiles.json', JSON.stringify(authProfiles, null, 2));

    // Write agent identity
    const identity = {
      name: 'Setup Agent',
      emoji: '⚙️',
      description: 'Infrastructure setup and deployment specialist',
      model: 'openrouter/openai/gpt-5.4-hybrid'
    };
    fs.writeFileSync('/root/.openclaw/workspace/IDENTITY.md', 
      `# IDENTITY.md\n\n- **Name:** ${identity.name}\n- **Emoji:** ${identity.emoji}\n- **Description:** ${identity.description}\n`);

    // Write Supabase agent card
    const agentCard = {
      id: 'setup-agent',
      name: 'Setup Agent',
      emoji: '⚙️',
      description: 'Infrastructure setup and deployment specialist',
      model: 'openrouter/openai/gpt-5.4-hybrid',
      status: 'active',
      task_types: ['setup'],
      available_credentials: [
        'GH_TOKEN',
        'SUPABASE_SERVICE_ROLE_KEY', 
        'SUPABASE_MGMT_TOKEN',
        'VERCEL_TOKEN',
        'OPENAI_API_KEY',
        'OPENROUTER_API_KEY',
        'ANTHROPIC_API_KEY'
      ],
      last_seen: new Date().toISOString()
    };

    console.log('Writing agent card to Supabase...');
    console.log([
      'Agent capabilities:',
      '- Vercel deployments and project setup',
      '- Database schema initialization', 
      '- Environment variable configuration',
      '- K8s resource provisioning',
      '- Use GPT-5.4 hybrid for complex infrastructure tasks',
      '- Handle setup task type exclusively'
    ].join('\n'));

    console.log('setup-agent config written OK');