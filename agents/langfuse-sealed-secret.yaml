---
# PLACEHOLDER: This SealedSecret needs to be created after Langfuse Cloud signup.
#
# Steps to create:
#   1. Sign up at https://cloud.langfuse.com and create a project (e.g. "dante-fleet")
#   2. Go to Settings > API Keys, create a new key pair
#   3. Create the secret:
#      kubectl create secret generic langfuse-secret \
#        --namespace agents \
#        --from-literal=LANGFUSE_PUBLIC_KEY=pk-lf-xxx \
#        --from-literal=LANGFUSE_SECRET_KEY=sk-lf-xxx \
#        --dry-run=client -o yaml | kubeseal --format yaml > agents/langfuse-sealed-secret.yaml
#   4. Commit the sealed secret to this repo
#
# Until sealed, use kubectl to create the secret directly for testing:
#   kubectl create secret generic langfuse-secret -n agents \
#     --from-literal=LANGFUSE_PUBLIC_KEY=pk-lf-xxx \
#     --from-literal=LANGFUSE_SECRET_KEY=sk-lf-xxx
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secret
  namespace: agents
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: "REPLACE_ME"
  LANGFUSE_SECRET_KEY: "REPLACE_ME"
