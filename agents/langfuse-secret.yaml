apiVersion: v1
kind: Secret
metadata:
  name: langfuse-env
  namespace: agents
  labels:
    app: langfuse
    purpose: observability
  annotations:
    description: "Langfuse Cloud API keys for LLM observability. Get keys from https://us.cloud.langfuse.com"
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: "REPLACE_ME"
  LANGFUSE_SECRET_KEY: "REPLACE_ME"
  LANGFUSE_BASEURL: "https://us.cloud.langfuse.com"
