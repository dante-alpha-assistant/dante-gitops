## ⚠️ PLACEHOLDER — Replace with SealedSecret after creating Langfuse Cloud project
## Steps:
##   1. Create project at https://cloud.langfuse.com
##   2. Get public key (pk-lf-xxx) and secret key (sk-lf-xxx)
##   3. Generate base64 auth: echo -n "pk-lf-xxx:sk-lf-xxx" | base64 -w 0
##   4. Seal this secret: kubeseal --format yaml < langfuse-secret.yaml > langfuse-sealed-secret.yaml
##   5. Replace this file with the sealed version
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-credentials
  namespace: agents
  labels:
    app: langfuse
    managed-by: gitops
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: "pk-lf-REPLACE_ME"
  LANGFUSE_SECRET_KEY: "sk-lf-REPLACE_ME"
  LANGFUSE_BASEURL: "https://cloud.langfuse.com"
  ## Pre-computed: echo -n "$LANGFUSE_PUBLIC_KEY:$LANGFUSE_SECRET_KEY" | base64 -w 0
  OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Basic REPLACE_WITH_BASE64_OF_PK:SK"
