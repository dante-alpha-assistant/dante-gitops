## Langfuse Cloud — shared secret for all agents
##
## This is a TEMPLATE. To deploy, seal it with kubeseal:
##
##   kubeseal --format yaml \
##     --cert <sealed-secrets-cert.pem> \
##     < agents/langfuse-secret.yaml \
##     > agents/langfuse-sealed-secret.yaml
##
## Then replace this file with the sealed version, or keep both
## and reference the SealedSecret in kustomization.yaml.
##
## After sealing, set the real values in the SealedSecret.
## Get keys from: https://cloud.langfuse.com → Project Settings → API Keys
##
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-env
  namespace: agents
  labels:
    app: langfuse
    purpose: observability
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: "pk-lf-CHANGEME"
  LANGFUSE_SECRET_KEY: "sk-lf-CHANGEME"
  LANGFUSE_BASEURL: "https://cloud.langfuse.com"
