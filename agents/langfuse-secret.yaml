# Langfuse Cloud credentials (shared by all agents)
# NOTE: This is a PLACEHOLDER. The actual secret must be created via:
#   kubectl -n agents create secret generic langfuse-env \
#     --from-literal=LANGFUSE_PUBLIC_KEY=<your-public-key> \
#     --from-literal=LANGFUSE_SECRET_KEY=<your-secret-key> \
#     --dry-run=client -o yaml | kubeseal --format yaml > agents/langfuse-sealed-secret.yaml
#
# Once sealed, replace this file with the SealedSecret version.
# For now, create the secret manually so agents can start using Langfuse immediately:
#   kubectl -n agents create secret generic langfuse-env \
#     --from-literal=LANGFUSE_PUBLIC_KEY=pk-lf-xxx \
#     --from-literal=LANGFUSE_SECRET_KEY=sk-lf-xxx
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-env
  namespace: agents
  labels:
    app: langfuse-config
    managed-by: gitops
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: "REPLACE_ME"
  LANGFUSE_SECRET_KEY: "REPLACE_ME"
