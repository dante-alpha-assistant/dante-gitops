apiVersion: v1
kind: Secret
metadata:
  name: langfuse-credentials
  namespace: agents
  labels:
    app: langfuse
    managed-by: gitops
type: Opaque
stringData:
  # ⚠️ PLACEHOLDER — replace with actual Langfuse Cloud credentials
  # then seal with: kubeseal --format yaml < langfuse-secret.yaml > langfuse-sealed-secret.yaml
  # 
  # Get keys from: https://cloud.langfuse.com → Settings → API Keys
  LANGFUSE_PUBLIC_KEY: "pk-lf-REPLACE_ME"
  LANGFUSE_SECRET_KEY: "sk-lf-REPLACE_ME"
  LANGFUSE_BASEURL: "https://cloud.langfuse.com"
