apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-worker
  namespace: agents
  labels:
    app: research-worker
    role: agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: research-worker
  template:
    metadata:
      labels:
        app: research-worker
        role: agent
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: init-tools
          image: debian:bookworm-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update -qq && apt-get install -y -qq curl ca-certificates openssh-client > /dev/null 2>&1
              curl -sL "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" -o /tools/kubectl
              chmod +x /tools/kubectl
              SSH_DIR=/pvc/.ssh
              mkdir -p "$SSH_DIR"
              [ ! -f "$SSH_DIR/id_ed25519" ] && ssh-keygen -t ed25519 -f "$SSH_DIR/id_ed25519" -N "" -q
              ssh-keyscan github.com >> "$SSH_DIR/known_hosts" 2>/dev/null
              sort -u "$SSH_DIR/known_hosts" -o "$SSH_DIR/known_hosts"
              chmod 700 "$SSH_DIR" && chmod 600 "$SSH_DIR/id_ed25519"
              mkdir -p /ssh-out
              cp "$SSH_DIR/id_ed25519" "$SSH_DIR/id_ed25519.pub" /ssh-out/
              [ -f "$SSH_DIR/known_hosts" ] && cp "$SSH_DIR/known_hosts" /ssh-out/
              chmod 600 /ssh-out/id_ed25519
              echo "Tools + SSH ready"
          volumeMounts:
            - { mountPath: /tools, name: tools-bin }
            - { mountPath: /pvc, name: data }
            - { mountPath: /ssh-out, name: ssh-out }
        - name: init-config
          image: node:22-bookworm-slim
          command: ["node", "/init-scripts/init.js"]
          envFrom:
            - secretRef:
                name: research-worker-env
          volumeMounts:
            - { mountPath: /root/.openclaw, name: data }
            - { mountPath: /init-scripts, name: init-scripts, readOnly: true }
      containers:
        - name: openclaw
          image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
          env:
            - name: PATH
              value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: research-worker-env
                  key: ANTHROPIC_API_KEY
          envFrom:
            - secretRef:
                name: research-worker-env
          ports:
            - containerPort: 18789
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { cpu: 1000m, memory: 2Gi }
          livenessProbe:
            tcpSocket: { port: 18789 }
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            tcpSocket: { port: 18789 }
            initialDelaySeconds: 60
            periodSeconds: 5
          volumeMounts:
            - { mountPath: /root/.openclaw, name: data }
            - { mountPath: /tools, name: tools-bin, readOnly: true }
            - { mountPath: /root/.ssh, name: ssh-out, readOnly: true }
      volumes:
        - { name: data, persistentVolumeClaim: { claimName: research-worker-data } }
        - { name: tools-bin, emptyDir: {} }
        - { name: ssh-out, emptyDir: {} }
        - { name: init-scripts, configMap: { name: research-worker-init } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: research-worker-data
  namespace: agents
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: research-worker
  namespace: agents
spec:
  selector:
    app: research-worker
  ports:
    - { port: 18789, targetPort: 18789 }
