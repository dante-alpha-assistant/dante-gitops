apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-worker
  namespace: agents
  labels:
    app: research-worker
    role: agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: research-worker
  template:
    metadata:
      labels:
        app: research-worker
        role: agent
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: init-tools
          image: debian:bookworm-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update -qq && apt-get install -y -qq curl ca-certificates openssh-client > /dev/null 2>&1
              KUBE_VER=v1.31.0
              curl -sL "https://dl.k8s.io/release/${KUBE_VER}/bin/linux/amd64/kubectl" -o /tools/kubectl
              chmod +x /tools/kubectl
              echo "kubectl ${KUBE_VER} installed"
              SSH_DIR=/pvc/.ssh
              mkdir -p "$SSH_DIR"
              if [ ! -f "$SSH_DIR/id_ed25519" ]; then
                ssh-keygen -t ed25519 -f "$SSH_DIR/id_ed25519" -N "" -q
              fi
              ssh-keyscan github.com >> "$SSH_DIR/known_hosts" 2>/dev/null
              sort -u "$SSH_DIR/known_hosts" -o "$SSH_DIR/known_hosts"
              chmod 700 "$SSH_DIR" && chmod 600 "$SSH_DIR/id_ed25519" && chmod 644 "$SSH_DIR/id_ed25519.pub"
              mkdir -p /ssh-out
              cp "$SSH_DIR/id_ed25519" /ssh-out/ && cp "$SSH_DIR/id_ed25519.pub" /ssh-out/
              [ -f "$SSH_DIR/known_hosts" ] && cp "$SSH_DIR/known_hosts" /ssh-out/
              chmod 600 /ssh-out/id_ed25519
              echo "Tools + SSH ready"
          volumeMounts:
            - mountPath: /tools
              name: tools-bin
            - mountPath: /pvc
              name: data
            - mountPath: /ssh-out
              name: ssh-out
        - name: init-config
          image: node:22-bookworm-slim
          command: ["node", "-e"]
          envFrom:
            - secretRef:
                name: research-worker-env
          args:
            - |
              const fs = require('fs');
              const e = process.env;
              const config = {
                gateway: {
                  port: 18789,
                  mode: "local",
                  bind: "lan",
                  auth: { mode: "token", token: e.OPENCLAW_GATEWAY_TOKEN || "" },
                  tools: { allow: ["sessions_spawn","sessions_send","sessions_list","sessions_history","session_status","cron"] },
                  controlUi: { dangerouslyAllowHostHeaderOriginFallback: true }
                },
                models: {
                  providers: {
                    anthropic: {
                      baseUrl: "https://api.anthropic.com",
                      models: [{ id: "claude-opus-4-6", name: "claude-opus-4-6", api: "anthropic-messages", reasoning: true, input: ["text","image"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 200000, maxTokens: 16384 }]
                    },
                    openrouter: {
                      baseUrl: "https://openrouter.ai/api/v1",
                      apiKey: e.OPENROUTER_API_KEY || "",
                      models: [
                        { id: "moonshotai/kimi-k2.5", name: "kimi-k2.5", api: "openai-completions", reasoning: true, input: ["text","image"], cost: { input: 0.45, output: 2.25 }, contextWindow: 262144, maxTokens: 8192 },
                        { id: "google/gemini-2.5-flash-preview", name: "gemini-flash", api: "openai-completions", reasoning: true, input: ["text","image"], cost: { input: 0.15, output: 0.6 }, contextWindow: 1048576, maxTokens: 8192 }
                      ]
                    }
                  }
                },
                agents: {
                  defaults: {
                    model: { primary: "openrouter/moonshotai/kimi-k2.5" },
                    workspace: "/root/.openclaw/workspace",
                    compaction: { mode: "safeguard" },
                    maxConcurrent: 4,
                    subagents: { maxConcurrent: 8 },
                    heartbeat: { every: "5m" },
                    thinking: "high"
                  }
                },
                hooks: { enabled: true, token: "research-worker-hooks-tok-2026", allowRequestSessionKey: true, defaultSessionKey: "hook:default", allowedSessionKeyPrefixes: ["hook:"] },
                tools: { sessions: { visibility: "all" } }
              };
              fs.mkdirSync('/root/.openclaw/workspace', { recursive: true });
              fs.mkdirSync('/root/.openclaw/workspace/research', { recursive: true });
              fs.mkdirSync('/root/.openclaw/workspace/memory', { recursive: true });
              fs.mkdirSync('/root/.openclaw/workspace/skills', { recursive: true });
              fs.writeFileSync('/root/.openclaw/openclaw.json', JSON.stringify(config, null, 2));

              // SOUL.md
              const soul = `# SOUL.md — Research Worker

              You are **research-worker**, a specialized deep research agent in the Dante fleet.

              ## Identity
              You are a researcher. You investigate, analyze, synthesize, and produce written deliverables.
              You do NOT write code, deploy infrastructure, or create PRs. You produce knowledge.

              ## How You Work
              1. Receive a research question or topic via task dispatch
              2. Use web_search extensively — multiple queries, different angles, cross-reference sources
              3. Synthesize findings into a structured research document
              4. Save output to /root/.openclaw/workspace/research/{topic-slug}.md
              5. Update task status with a summary of findings

              ## Research Standards
              - **Cite sources** — every claim needs a URL or reference
              - **Multiple perspectives** — don't just take the first result
              - **Actionable recommendations** — end with clear next steps
              - **Cost estimates** — when evaluating tools/services, include pricing
              - **Comparison tables** — when evaluating alternatives, use structured comparisons
              - **Be honest about uncertainty** — if you can't find good data, say so

              ## Output Format
              Every research deliverable must have:
              - Executive summary (3-5 sentences)
              - Key findings (numbered)
              - Detailed analysis (sections with headers)
              - Recommendations (prioritized)
              - Sources (numbered list with URLs)
              - Appendix (raw data, calculations, if applicable)

              ## Personality
              Thorough, methodical, skeptical of marketing claims, data-driven.
              You dig deeper than the first page of results.
              `.split('\\n').map(l => l.trim()).join('\\n');
              fs.writeFileSync('/root/.openclaw/workspace/SOUL.md', soul);

              // IDENTITY.md
              fs.writeFileSync('/root/.openclaw/workspace/IDENTITY.md', [
                '# IDENTITY.md',
                '',
                '- **Name:** Research Worker',
                '- **Creature:** Deep Research Agent',
                '- **Vibe:** Thorough, analytical, citation-heavy',
                '- **Emoji:** 🔬',
                '- **Role:** Produces research documents, analysis, and recommendations',
                '- **Fleet:** Part of the Dante agent fleet on K8s cluster',
              ].join('\\n'));

              // MEMORY.md
              fs.writeFileSync('/root/.openclaw/workspace/MEMORY.md', [
                '# MEMORY.md — Research Worker',
                '',
                '## Fleet Context',
                '- Fleet leader: Alpha (product owner)',
                '- Coding agents: neo-worker, ifra-worker',
                '- QA agent: beta-worker',
                '- Research: research-worker (me)',
                '- Cluster: K3s on 167.235.61.168',
                '- Task board: tasks.dante.id (Supabase)',
                '',
                '## Completed Research',
                '(none yet — first deployment)',
              ].join('\\n'));

              // AGENTS.md
              fs.writeFileSync('/root/.openclaw/workspace/AGENTS.md', [
                '# AGENTS.md — Research Worker',
                '',
                '## Every Session',
                '1. Read SOUL.md — you are a researcher',
                '2. Check memory/ for recent context',
                '3. When receiving a task, follow the research methodology in SOUL.md',
                '',
                '## Output Location',
                '- Research documents: research/{topic-slug}.md',
                '- Daily notes: memory/YYYY-MM-DD.md',
                '',
                '## Rules',
                '- NEVER delete tasks from the task board',
                '- ALL work must go through a task on tasks.dante.id',
                '- Always cite sources with URLs',
                '- Save research to files, not just chat messages',
              ].join('\\n'));

              // Heartbeat
              const sbUrl = 'https://lessxkxujvcmublgwdaa.supabase.co';
              const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxlc3N4a3h1anZjbXVibGd3ZGFhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTM2MTQ2NSwiZXhwIjoyMDg2OTM3NDY1fQ.Wo2WczTauYjpaqtAzfADTSa5htFF6_cKU4UHaJ1EARI';
              fs.writeFileSync('/root/.openclaw/workspace/HEARTBEAT.md', [
                '# HEARTBEAT.md — Agent Card Self-Update',
                '',
                '## Step 1: Check status',
                '```bash',
                `STATUS=$(curl -s "${sbUrl}/rest/v1/agent_cards?id=eq.research-worker&select=status" \\`,
                `  -H "apikey: ${sbKey}" \\`,
                `  -H "Authorization: Bearer ${sbKey}" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)`,
                'echo "Current status: $STATUS"',
                '```',
                'If disabled, reply HEARTBEAT_OK.',
                '',
                '## Step 2: Update agent card',
                '```bash',
                `curl -s -X PATCH "${sbUrl}/rest/v1/agent_cards?id=eq.research-worker" \\`,
                `  -H "apikey: ${sbKey}" \\`,
                `  -H "Authorization: Bearer ${sbKey}" \\`,
                '  -H "Content-Type: application/json" \\',
                `  -d '{"status":"online","last_heartbeat":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}'`,
                '```',
                'Reply HEARTBEAT_OK.',
              ].join('\\n'));

              // Heartbeat cron
              const cronDir = '/root/.openclaw/cron';
              fs.mkdirSync(cronDir, { recursive: true });
              if (!fs.existsSync(cronDir + '/jobs.json')) {
                fs.writeFileSync(cronDir + '/jobs.json', JSON.stringify({
                  version: 1,
                  jobs: [{
                    id: 'heartbeat-agent-card',
                    name: 'heartbeat-agent-card',
                    enabled: true,
                    createdAtMs: Date.now(),
                    updatedAtMs: Date.now(),
                    schedule: { kind: 'every', everyMs: 300000, anchorMs: Date.now() },
                    sessionTarget: 'isolated',
                    wakeMode: 'now',
                    payload: { kind: 'agentTurn', message: 'Run the heartbeat: update your agent card. Read HEARTBEAT.MD and follow it.', timeoutSeconds: 30 },
                    delivery: { mode: 'none', channel: 'last' },
                    state: { nextRunAtMs: Date.now() + 300000 }
                  }]
                }, null, 2));
              }

              // task-worker skill
              const skillDir = '/root/.openclaw/workspace/skills/task-worker';
              fs.mkdirSync(skillDir, { recursive: true });
              fs.writeFileSync(skillDir + '/SKILL.md', [
                '# task-worker — Research Task Execution',
                '',
                '## When to Use',
                'When you receive a dispatched task with a JSON payload.',
                '',
                '## Steps',
                '1. Parse the task payload (task_id, title, description)',
                '2. Conduct thorough web research using multiple search queries',
                '3. Cross-reference sources, check dates, verify claims',
                '4. Write findings to research/{topic-slug}.md',
                '5. Update task status via the curl commands in the payload',
                '',
                '## Status Updates',
                'Always update task status when done. Include summary in result field.',
              ].join('\\n'));

              // Auth profiles from env
              const authDir = '/root/.openclaw/agents/main/agent';
              fs.mkdirSync(authDir, { recursive: true });
              const apiKey = e.ANTHROPIC_API_KEY || '';
              if (apiKey) {
                const auth = { version: 1, profiles: { 'anthropic:default': { type: 'token', provider: 'anthropic', token: apiKey } }, lastGood: { anthropic: 'anthropic:default' } };
                fs.writeFileSync(authDir + '/auth-profiles.json', JSON.stringify(auth, null, 2));
                console.log('auth-profiles.json written');
              }
              console.log('Research worker config ready');
          volumeMounts:
            - mountPath: /root/.openclaw
              name: data
      containers:
        - name: openclaw
          image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
          env:
            - name: PATH
              value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: research-worker-env
                  key: ANTHROPIC_API_KEY
          envFrom:
            - secretRef:
                name: research-worker-env
          ports:
            - containerPort: 18789
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /root/.openclaw
              name: data
            - mountPath: /tools
              name: tools-bin
              readOnly: true
            - mountPath: /root/.ssh
              name: ssh-out
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: research-worker-data
        - name: tools-bin
          emptyDir: {}
        - name: ssh-out
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: research-worker-data
  namespace: agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: research-worker
  namespace: agents
spec:
  selector:
    app: research-worker
  ports:
    - port: 18789
      targetPort: 18789
