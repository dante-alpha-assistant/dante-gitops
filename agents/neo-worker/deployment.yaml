apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo-worker
  namespace: agents
  labels:
    app: neo-worker
    role: agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo-worker
  template:
    metadata:
      labels:
        app: neo-worker
        role: agent
    spec:
      initContainers:
        - name: init-tools
          image: debian:bookworm-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update -qq && apt-get install -y -qq curl ca-certificates openssh-client > /dev/null 2>&1
              KUBE_VER=v1.31.0
              curl -sL "https://dl.k8s.io/release/${KUBE_VER}/bin/linux/amd64/kubectl" -o /tools/kubectl
              chmod +x /tools/kubectl
              echo "kubectl ${KUBE_VER} installed"
              SSH_DIR=/pvc/.ssh
              mkdir -p "$SSH_DIR"
              if [ ! -f "$SSH_DIR/id_ed25519" ]; then
                ssh-keygen -t ed25519 -f "$SSH_DIR/id_ed25519" -N "" -q
              fi
              ssh-keyscan github.com 167.235.61.168 >> "$SSH_DIR/known_hosts" 2>/dev/null
              sort -u "$SSH_DIR/known_hosts" -o "$SSH_DIR/known_hosts"
              chmod 700 "$SSH_DIR"
              chmod 600 "$SSH_DIR/id_ed25519"
              chmod 644 "$SSH_DIR/id_ed25519.pub"
              [ -f "$SSH_DIR/known_hosts" ] && chmod 644 "$SSH_DIR/known_hosts"
              mkdir -p /ssh-out
              cp "$SSH_DIR/id_ed25519" /ssh-out/id_ed25519
              cp "$SSH_DIR/id_ed25519.pub" /ssh-out/id_ed25519.pub
              [ -f "$SSH_DIR/known_hosts" ] && cp "$SSH_DIR/known_hosts" /ssh-out/known_hosts
              chmod 600 /ssh-out/id_ed25519
              chmod 644 /ssh-out/id_ed25519.pub
              [ -f /ssh-out/known_hosts ] && chmod 644 /ssh-out/known_hosts
              echo "Tools + SSH ready"
          volumeMounts:
            - name: tools-bin
              mountPath: /tools
            - name: data
              mountPath: /pvc
            - name: ssh-out
              mountPath: /ssh-out
        - name: init-config
          image: node:22-bookworm-slim
          command: ["node", "-e"]
          args:
            - |
              const fs = require('fs');
              const e = process.env;
              const config = {
                gateway: {
                  port: 18789,
                  mode: "local",
                  bind: "lan",
                  auth: { mode: "token", token: e.OPENCLAW_GATEWAY_TOKEN || "" },
                  tools: { allow: ["sessions_spawn","sessions_send","sessions_list","sessions_history","session_status","cron"] },
                  controlUi: { dangerouslyAllowHostHeaderOriginFallback: true }
                },
                models: {
                  providers: {
                    anthropic: {
                      baseUrl: "https://api.anthropic.com",
                      models: [{ id: "claude-opus-4-6", name: "claude-opus-4-6", api: "anthropic-messages", reasoning: true, input: ["text","image"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 200000, maxTokens: 16384 }]
                    },
                    openrouter: {
                      baseUrl: "https://openrouter.ai/api/v1",
                      apiKey: e.OPENROUTER_API_KEY || "",
                      models: [
                        { id: "moonshotai/kimi-k2.5", name: "kimi-k2.5", api: "openai-completions", reasoning: true, input: ["text","image"], cost: { input: 0.45, output: 2.25, cacheRead: 0.07, cacheWrite: 0 }, contextWindow: 262144, maxTokens: 8192 },
                      ]
                    },
                    openai: {
                      baseUrl: "https://api.openai.com/v1",
                      apiKey: e.OPENAI_API_KEY || "",
                      auth: "api-key",
                      api: "openai-responses",
                      models: [
                        { id: "gpt-5.2-codex", name: "gpt-5.2-codex", api: "openai-responses", reasoning: true, input: ["text"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 400000, maxTokens: 16384 }
                      ]
                    }
                  }
                },
                agents: {
                  defaults: {
                    model: { primary: "anthropic/claude-opus-4-6" },
                    workspace: "/root/.openclaw/workspace",
                    compaction: { mode: "safeguard" },
                    maxConcurrent: 4,
                    subagents: { maxConcurrent: 8 },
                    heartbeat: { every: "5m" }
                  }
                },
                hooks: { enabled: true, token: "neo-worker-hooks-tok-2026", allowRequestSessionKey: true, defaultSessionKey: "hook:default", allowedSessionKeyPrefixes: ["hook:"] },
                tools: { sessions: { visibility: "all" } }
              };
              fs.mkdirSync('/root/.openclaw/workspace', { recursive: true });
              fs.mkdirSync('/root/.openclaw/skills', { recursive: true });
              fs.writeFileSync('/root/.openclaw/openclaw.json', JSON.stringify(config, null, 2));
              // HEARTBEAT.md — agent card self-update
              const hbPath = '/root/.openclaw/workspace/HEARTBEAT.md';
              const agentId = 'neo-worker';
              const sbUrl = 'https://lessxkxujvcmublgwdaa.supabase.co';
              const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxlc3N4a3h1anZjbXVibGd3ZGFhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTM2MTQ2NSwiZXhwIjoyMDg2OTM3NDY1fQ.Wo2WczTauYjpaqtAzfADTSa5htFF6_cKU4UHaJ1EARI';
              const heartbeat = [
                '# HEARTBEAT.md — Agent Card Self-Update + Model Health Check',
                '',
                'Run these steps IN ORDER every heartbeat. Do NOT modify any commands.',
                '',
                '## Step 1: Check current status',
                '',
                '```bash',
                `STATUS=$(curl -s "${sbUrl}/rest/v1/agent_cards?id=eq.${agentId}&select=status" \\`,
                `  -H "apikey: ${sbKey}" \\`,
                `  -H "Authorization: Bearer ${sbKey}" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)`,
                'echo "Current status: $STATUS"',
                '```',
                '',
                'If status is "disabled", skip everything and reply HEARTBEAT_OK.',
                '',
                '## Step 2: Model health verified',
                '',
                'If you are reading and executing this, your model API is healthy.',
                '(A broken model would cause this heartbeat session to fail before reaching here.)',
                '',
                '## Step 3: Update agent card — online + model_health ok',
                '',
                '```bash',
                `curl -s -X PATCH "${sbUrl}/rest/v1/agent_cards?id=eq.${agentId}" \\`,
                `  -H "apikey: ${sbKey}" \\`,
                `  -H "Authorization: Bearer ${sbKey}" \\`,
                '  -H "Content-Type: application/json" \\',
                `  -d '{"status":"online","last_heartbeat":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","metadata":{"model_health":"ok","model_health_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}}'`,
                '```',
                '',
                'If the curl succeeds, reply HEARTBEAT_OK.',
              ].join('\\n');
              // Only write if not already customized by the agent
              if (!fs.existsSync(hbPath) || fs.readFileSync(hbPath, 'utf8').includes('Keep this file empty')) {
                fs.writeFileSync(hbPath, heartbeat);
              }
              // Seed heartbeat cron job
              const cronDir = '/root/.openclaw/cron';
              const cronPath = cronDir + '/jobs.json';
              fs.mkdirSync(cronDir, { recursive: true });
              if (!fs.existsSync(cronPath)) {
                const cronJobs = {
                  version: 1,
                  jobs: [{
                    id: 'heartbeat-agent-card',
                    name: 'heartbeat-agent-card',
                    enabled: true,
                    createdAtMs: Date.now(),
                    updatedAtMs: Date.now(),
                    schedule: { kind: 'every', everyMs: 300000, anchorMs: Date.now() },
                    sessionTarget: 'isolated',
                    wakeMode: 'now',
                    payload: { kind: 'agentTurn', message: 'Run the heartbeat: update your agent card. Read HEARTBEAT.MD and follow it.', timeoutSeconds: 30 },
                    delivery: { mode: 'none', channel: 'last' },
                    state: { nextRunAtMs: Date.now() + 300000 }
                  }]
                };
                fs.writeFileSync(cronPath, JSON.stringify(cronJobs, null, 2));
              }
              // --- task-worker skill ---
              const skillDir = '/root/.openclaw/workspace/skills/task-worker';
              fs.mkdirSync(skillDir, { recursive: true });
              fs.writeFileSync(skillDir + '/SKILL.md', [
                '# task-worker — Dispatched Task Execution Skill',
                '',
                '## When to Use',
                'This skill applies to EVERY message from "Task Dispatcher" that contains a JSON task payload.',
                'If you see `## Task Assigned:` in the message, follow this skill.',
                '',
                '## Workspace Repos (NEVER clone fresh!)',
                'Your repos are already cloned in your workspace:',
                '- `queue-dashboard/` — Dashboard frontend + Express backend (tasks.dante.id)',
                '- `task-dispatcher/` — Task dispatcher service',
                '- `dante-gitops/` — Kubernetes manifests + ArgoCD configs',
                '',
                '**ALWAYS work in these existing directories.** Do NOT `git clone` to `/tmp/` or anywhere else.',
                '',
                '## Git Workflow',
                '1. `cd <repo>` (e.g., `cd queue-dashboard`)',
                '2. `git fetch origin && git checkout main && git pull origin main`',
                '3. `git checkout -b task/<task-id-first-8-chars>` (e.g., `task/4cc804fa`)',
                '4. Make your changes',
                '5. `git add -A && git commit -m "<type>: <description> [task:<id>]"`',
                '6. `git push origin HEAD`',
                '7. Create PR: `gh pr create --title "<title>" --body "Task: <id>\\n\\n<description>" --base main`',
                '',
                '## GitHub Auth',
                '- `gh` CLI is available. Auth via `GH_TOKEN` env var (already set).',
                '- If `gh` auth fails, use: `git remote set-url origin https://${GH_TOKEN}@github.com/dante-alpha-assistant/<repo>.git`',
                '',
                '## Build & Test',
                '- Dashboard: `cd queue-dashboard && npm install && npm run build` (Vite frontend in `client/`)',
                '- Dispatcher: `cd task-dispatcher && npm install && node index.js` (test startup only)',
                '- Always run `npm install` if you change `package.json`',
                '- Always test your changes compile/build before committing',
                '',
                '## Docker Build (for deployment)',
                '- Dashboard has a `Dockerfile` — after pushing PR, the GitHub Actions workflow builds + pushes to GHCR',
                '- ArgoCD Image Updater auto-deploys new images',
                '',
                '## Status Updates',
                'The dispatch message includes curl commands for status updates. ALWAYS run them when done.',
                'Include a meaningful summary in the `result.summary` field — what files changed, what the fix does.',
                '',
                '## Common Mistakes to Avoid',
                '- ❌ `git clone` to `/tmp/` — repos are already in workspace',
                '- ❌ Editing files that do not exist — always verify the file path with `ls` or `find` first',
                '- ❌ Forgetting to `git pull` — always pull latest before branching',
                '- ❌ Not testing — always `npm run build` or equivalent before committing',
                '- ❌ Generic commit messages — include the task ID and what changed',
                '- ❌ Leaving task in_progress — ALWAYS update to done or failed',
              ].join('\n'));
              // Write TOOLS.md with repo locations (always overwrite — this is infra truth)
              fs.writeFileSync('/root/.openclaw/workspace/TOOLS.md', [
                '# TOOLS.md — neo-worker',
                '',
                '## Workspace Repos',
                '- `queue-dashboard/` — Dashboard frontend + Express backend (tasks.dante.id)',
                '- `task-dispatcher/` — Task dispatcher service',  
                '- `dante-gitops/` — Kubernetes manifests + ArgoCD configs',
                '',
                '## Skills',
                '- **task-worker**: Read `skills/task-worker/SKILL.md` when handling dispatched tasks',
                '- **coding-task**: Read `skills/coding-task/SKILL.md` for coding tasks (clone, branch, PR workflow)',
                '',
                '## Git',
                '- GitHub org: dante-alpha-assistant',
                '- Auth: GH_TOKEN env var (use with gh CLI or git remote URL)',
                '- NEVER clone repos to /tmp/ — they are in your workspace already',
                '',
                '## K8s',
                '- kubectl available at /tools/kubectl',
                '- Cluster: k3s on 167.235.61.168',
                '- Namespaces: agents, dev, infra, dante',
              ].join('\n'));
              // SOUL.md for neo-worker
              const soulPath = '/root/.openclaw/workspace/SOUL.md';
              fs.writeFileSync(soulPath, [
                '# SOUL.md - neo-worker',
                '',
                'You are **neo-worker**, a headless coding agent. You receive tasks from the dispatcher and execute them.',
                '',
                '## Core Rules',
                '- You are a CODER. Your job is to write code, create PRs, and update task status.',
                '- When you receive a dispatched coding task, ALWAYS read `skills/coding-task/SKILL.md` and follow it step by step.',
                '- Look for `## Coding Task` section in dispatch messages — it has repo URL and branch convention.',
                '- NEVER try to edit files without cloning/pulling the repo first.',
                '- ALWAYS create a feature branch, never commit to main directly.',
                '- ALWAYS create a PR with a clear title and description.',
                '- ALWAYS update task status when done (done on success, failed on error).',
                '',
                '## Task Detection',
                '- If the message contains a JSON block with `task_id` and `## Task Assigned:`, it is a dispatched task.',
                '- If it contains `## Coding Task`, use the `skills/coding-task/SKILL.md` skill.',
                '- The dispatch message includes curl commands for status updates — ALWAYS run them.',
                '',
                '## Environment',
                '- GH_TOKEN is available as an env var for git operations',
                '- Git user: Neo <dante-neo-assistant@proton.me>',
                '- Workspace: /root/.openclaw/workspace/',
                '- Repos: queue-dashboard/, task-dispatcher/, dante-gitops/ (already cloned)',
              ].join('\n'));

              // AGENTS.md
              const agentsPath = '/root/.openclaw/workspace/AGENTS.md';
              fs.writeFileSync(agentsPath, [
                '# AGENTS.md - neo-worker',
                '',
                '## Every Session',
                '1. Read SOUL.md',
                '2. When receiving a task, follow the coding-task skill',
                '',
                '## Git Setup',
                'Run before any git operations:',
                'git config --global user.email "dante-neo-assistant@proton.me"',
                'git config --global user.name "Neo"',
                '',
                '## Repos',
                '- queue-dashboard: https://github.com/dante-alpha-assistant/queue-dashboard',
                '- task-dispatcher: https://github.com/dante-alpha-assistant/task-dispatcher',
                '- dante-gitops: https://github.com/dante-alpha-assistant/dante-gitops',
              ].join('\n'));

              // coding-task skill (enhanced — synced with agents/neo-worker/skills/coding-task/SKILL.md)
              const codingSkillDir = '/root/.openclaw/workspace/skills/coding-task';
              fs.mkdirSync(codingSkillDir, { recursive: true });
              fs.writeFileSync(codingSkillDir + '/SKILL.md', [
                '# coding-task — Dispatched Coding Task Skill',
                '',
                '## When to Use',
                '',
                'This skill applies when you receive a message containing:',
                '- A JSON block with `task_id`, `title`, `description`',
                '- The header `## Task Assigned:`',
                '- A `## Coding Task` section with repo/branch info',
                '',
                '**If you see these markers, follow this skill step by step.**',
                '',
                '## Step 1: Parse the Task',
                '',
                'Extract from the JSON payload:',
                '- `task_id` — unique identifier (used for branch naming and status updates)',
                '- `title` — short task title (used for PR title)',
                '- `description` — full requirements',
                '- `repo` — target repository (from Coding Task section or description)',
                '',
                'Known repos (all under `dante-alpha-assistant`):',
                '| Repo | Path in workspace | Description |',
                '|------|-------------------|-------------|',
                '| `queue-dashboard` | `queue-dashboard/` | Dashboard frontend (Vite) + Express backend |',
                '| `task-dispatcher` | `task-dispatcher/` | Task dispatcher service (Node.js) |',
                '| `dante-gitops` | `dante-gitops/` | K8s manifests + ArgoCD configs |',
                '',
                '## Step 2: Setup Git',
                '',
                '```bash',
                'git config --global user.email "dante-neo-assistant@proton.me"',
                'git config --global user.name "Neo"',
                '```',
                '',
                '## Step 3: Prepare the Repo',
                '',
                '**CRITICAL: NEVER edit files without preparing the repo first. NEVER clone to /tmp/.**',
                '',
                '```bash',
                'cd /root/.openclaw/workspace',
                '',
                '# If repo exists in workspace, update it',
                'if [ -d "<repo-name>" ]; then',
                '  cd <repo-name>',
                '  git fetch origin',
                '  git checkout main',
                '  git pull origin main',
                'else',
                '  # Clone fresh — use GH_TOKEN for auth',
                '  git clone https://x-access-token:${GH_TOKEN}@github.com/dante-alpha-assistant/<repo-name>.git',
                '  cd <repo-name>',
                'fi',
                '```',
                '',
                '## Step 4: Create a Feature Branch',
                '',
                '```bash',
                'git checkout -b feat/<short-kebab-description>',
                '```',
                '',
                'Conventions: `feat/`, `fix/`, `chore/`, `refactor/`',
                '',
                '## Step 5: Understand Before Editing',
                '',
                'Before making changes:',
                '1. **Read the relevant files** — `ls`, `find`, `cat` to understand structure',
                '2. **Check existing patterns** — follow the codebase conventions',
                '3. **Verify file paths exist** — never edit a file without confirming it is there',
                '',
                '## Step 6: Make the Changes',
                '',
                '- Keep changes focused on the task requirements',
                '- Follow existing code style and patterns',
                '- Handle errors appropriately',
                '',
                '## Step 7: Build and Test',
                '',
                '```bash',
                '# queue-dashboard: npm install && npm run build',
                '# task-dispatcher: npm install',
                '# dante-gitops: validate YAML syntax',
                '```',
                '',
                '**Always verify changes compile/build before committing.**',
                '',
                '## Step 8: Commit and Push',
                '',
                '```bash',
                'git add -A',
                'git commit -m "<type>: <description>"',
                'git push -u origin HEAD',
                '```',
                '',
                '## Step 9: Create a Pull Request',
                '',
                '```bash',
                'gh pr create --repo dante-alpha-assistant/<repo-name> \\',
                '  --title "<task title>" \\',
                '  --body "## Summary\\n<changes>\\n\\n## Task\\n- ID: <task_id>\\n- Priority: <priority>" \\',
                '  --base main',
                '```',
                '',
                '**Multi-repo tasks:** Create a PR in each repo, cross-reference them.',
                '',
                '## Step 10: Update Task Status',
                '',
                'Use the curl commands from the dispatch message.',
                '- **Success:** include PR number, repo, and summary of changes',
                '- **Failure:** include specific error and what step failed',
                '',
                '## Common Mistakes to AVOID',
                '',
                '- ❌ Editing files without cloning/pulling the repo first',
                '- ❌ Cloning repos to `/tmp/` — always use workspace',
                '- ❌ Committing directly to `main`',
                '- ❌ Forgetting `git pull` before branching',
                '- ❌ Not building/testing before committing',
                '- ❌ Assuming file paths — always `ls`/`find` to verify',
                '- ❌ Leaving task as in_progress — ALWAYS update status',
              ].join('\n'));

              console.log('Config + HEARTBEAT.md + SOUL.md + coding-task skill written OK');
          envFrom:
            - secretRef:
                name: neo-worker-env
          volumeMounts:
            - name: data
              mountPath: /root/.openclaw
      containers:
        - name: openclaw
          image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
          ports:
            - containerPort: 18789
          envFrom:
            - secretRef:
                name: neo-worker-env
          env:
            - name: PATH
              value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          volumeMounts:
            - name: data
              mountPath: /root/.openclaw
            - name: tools-bin
              mountPath: /tools
              readOnly: true
            - name: ssh-out
              mountPath: /root/.ssh
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo-worker-data
        - name: tools-bin
          emptyDir: {}
        - name: ssh-out
          emptyDir: {}
      imagePullSecrets:
        - name: ghcr-secret
