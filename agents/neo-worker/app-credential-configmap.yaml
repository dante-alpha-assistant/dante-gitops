---
apiVersion: v1
kind: ConfigMap
metadata:
  name: neo-worker-app-credentials
  namespace: agents
data:
  process-app-creds.sh: |
    #!/bin/bash
    # App Credential Processor for OpenClaw Hook Payloads
    
    process_app_credentials() {
        local hook_payload="$*"
        
        echo "[APP-CREDS] Checking for appCredentials in hook payload..."
        
        # Check if appCredentials field exists in the payload
        if echo "$hook_payload" | jq -e '.appCredentials' >/dev/null 2>&1; then
            echo "[APP-CREDS] Found appCredentials, processing..."
            
            # Extract and export each credential
            echo "$hook_payload" | jq -r '.appCredentials | to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r key value; do
                if [ -n "$key" ] && [ -n "$value" ]; then
                    # Export to current shell
                    export "$key"="$value"
                    
                    # Also write to persistent session file
                    echo "export $key=\"$value\"" >> "/tmp/session-app-creds.env"
                    
                    echo "[APP-CREDS] ✅ Set $key (${#value} chars)"
                fi
            done
            
            # Make session file readable
            chmod 600 "/tmp/session-app-creds.env" 2>/dev/null || true
            
            echo "[APP-CREDS] App credentials processed successfully"
            echo "[APP-CREDS] Session file: /tmp/session-app-creds.env"
            
        else
            echo "[APP-CREDS] No appCredentials found in payload"
        fi
    }
    
    # Export function for use in OpenClaw hooks
    export -f process_app_credentials
    
    # If called directly with arguments, process them
    if [ $# -gt 0 ]; then
        process_app_credentials "$@"
    fi