---
# PLACEHOLDER — must be sealed with kubeseal before applying.
# Required keys: OPENROUTER_API_KEY, GH_TOKEN, OPENCLAW_GATEWAY_TOKEN
# Gateway token value: beta-worker-gw-tok-2026
# Hooks token is baked into init-config (beta-worker-hooks-tok-2026)
#
# To seal:
#   kubectl create secret generic beta-worker-env --namespace=agents --dry-run=client -o json \
#     --from-literal=OPENROUTER_API_KEY=<key> \
#     --from-literal=GH_TOKEN=<key> \
#     --from-literal=OPENCLAW_GATEWAY_TOKEN=beta-worker-gw-tok-2026 \
#     | kubeseal --controller-name=sealed-secrets --controller-namespace=kube-system -o yaml \
#     > agents/beta-worker/sealed-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: beta-worker-env
  namespace: agents
spec:
  encryptedData: {}
  template:
    metadata:
      name: beta-worker-env
      namespace: agents
