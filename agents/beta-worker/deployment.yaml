apiVersion: apps/v1
kind: Deployment
metadata:
  name: beta-worker
  namespace: agents
  labels:
    app: beta-worker
    role: agent
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: beta-worker
  template:
    metadata:
      labels:
        app: beta-worker
        role: agent
      annotations:
        secret.reloader.stakater.com/reload: beta-worker-env
    spec:
      initContainers:
      - name: init-tools
        image: debian:bookworm-slim
        command:
        - /bin/bash
        - -c
        args:
        - 'set -e

          apt-get update -qq && apt-get install -y -qq curl ca-certificates openssh-client
          > /dev/null 2>&1

          KUBE_VER=v1.31.0

          curl -sL "https://dl.k8s.io/release/${KUBE_VER}/bin/linux/amd64/kubectl"
          -o /tools/kubectl

          chmod +x /tools/kubectl

          SSH_DIR=/data/.ssh

          mkdir -p "$SSH_DIR"

          ssh-keygen -t ed25519 -f "$SSH_DIR/id_ed25519" -N "" -q

          ssh-keyscan github.com 167.235.61.168 >> "$SSH_DIR/known_hosts" 2>/dev/null

          sort -u "$SSH_DIR/known_hosts" -o "$SSH_DIR/known_hosts"

          chmod 700 "$SSH_DIR" && chmod 600 "$SSH_DIR/id_ed25519" && chmod 644 "$SSH_DIR/id_ed25519.pub"

          [ -f "$SSH_DIR/known_hosts" ] && chmod 644 "$SSH_DIR/known_hosts"

          mkdir -p /ssh-out

          cp "$SSH_DIR/id_ed25519" /ssh-out/id_ed25519

          cp "$SSH_DIR/id_ed25519.pub" /ssh-out/id_ed25519.pub

          [ -f "$SSH_DIR/known_hosts" ] && cp "$SSH_DIR/known_hosts" /ssh-out/known_hosts

          chmod 600 /ssh-out/id_ed25519 && chmod 644 /ssh-out/id_ed25519.pub

          [ -f /ssh-out/known_hosts ] && chmod 644 /ssh-out/known_hosts

          echo "Tools + SSH ready"

          '
        volumeMounts:
        - name: tools-bin
          mountPath: /tools
        - name: data
          mountPath: /data
        - name: ssh-out
          mountPath: /ssh-out
      - name: init-config
        image: node:22-bookworm-slim
        command:
        - node
        - -e
        args:
        - "const fs = require('fs');\nconst e = process.env;\nconst config = {\n \
          \ gateway: {\n    port: 18789,\n    mode: \"local\",\n    bind: \"lan\"\
          ,\n    auth: { mode: \"token\", token: e.OPENCLAW_GATEWAY_TOKEN || \"beta-worker-gw-tok-2026\"\
          \ },\n    tools: { allow: [\"Read\",\"Write\",\"Edit\",\"exec\",\"web_fetch\"\
          ,\"sessions_spawn\",\"sessions_send\",\"sessions_list\",\"sessions_history\"\
          ,\"session_status\"] },\n    controlUi: { dangerouslyAllowHostHeaderOriginFallback:\
          \ true }\n  },\n  models: {\n    providers: {\n      openrouter: {\n   \
          \     baseUrl: \"https://openrouter.ai/api/v1\",\n        apiKey: e.OPENROUTER_API_KEY\
          \ || \"\",\n        models: [\n          { id: \"moonshotai/kimi-k2.5\"\
          , name: \"kimi-k2.5\", api: \"openai-completions\", reasoning: true, input:\
          \ [\"text\",\"image\"], cost: { input: 0.45, output: 2.25 }, contextWindow:\
          \ 262144, maxTokens: 16384 }\n        ]\n      }\n    }\n  },\n  agents:\
          \ {\n    defaults: {\n      model: { primary: \"openrouter/moonshotai/kimi-k2.5\"\
          \ },\n      workspace: \"/root/.openclaw/workspace\",\n      compaction:\
          \ { mode: \"safeguard\" },\n      maxConcurrent: 2,\n      sandbox: { browser: { enabled: true, headless: true } },\n    }\n  },\n  hooks:\
          \ { enabled: true, token: e.HOOKS_TOKEN || \"beta-worker-hooks-tok-2026\"\
          , allowRequestSessionKey: true, defaultSessionKey: \"hook:default\", allowedSessionKeyPrefixes:\
          \ [\"hook:\"] },\n  tools: { sessions: { visibility: \"all\" } },\n  browser: { enabled: true, headless: true, noSandbox: true, defaultProfile: \"openclaw\", executablePath: \"/usr/bin/chromium\", color: \"#FF4500\", profiles: { openclaw: { cdpPort: 18800, color: \"#FF4500\" } } }\n};\nfs.mkdirSync('/root/.openclaw/workspace',\
          \ { recursive: true });\nfs.mkdirSync('/root/.openclaw/skills', { recursive:\
          \ true });\nfs.writeFileSync('/root/.openclaw/openclaw.json', JSON.stringify(config,\
          \ null, 2));\n// Minimal workspace files\nfs.writeFileSync('/root/.openclaw/workspace/AGENTS.md',\
          \ '# QA Worker\\nYou are a QA testing agent for the Dante fleet.\\nReview\
          \ tasks, verify work quality, update status.\\nDo NOT create memory files.\\\
          n');\nfs.writeFileSync('/root/.openclaw/workspace/SOUL.md', '# SOUL.md - Beta Worker\n\nYou are **beta-worker** \u2014 a headless QA testing agent on K8s.\n\n## Role\n- Review completed tasks for quality\n- Check code via gh CLI, browser screenshots, and build verification\n- Update task status to completed or failed\n- Merge approved PRs\n\n## Rules\n- Be thorough but fast (15 min per task max)\n- Never delete tasks\n- Use curl for Supabase API calls\n- Use gh CLI for PR review\n\n## Browser-Based QA (Headless Chromium)\n\nThe browser tool works in headless mode on this pod. USE IT for frontend verification.\n\n### For frontend tasks:\n1. Start browser if not running: use browser action=start\n2. Navigate to the deployed URL or localhost dev server\n3. Take a screenshot of every key page \u2014 confirm non-blank content\n4. Check snapshot for expected UI elements\n5. A blank page = automatic QA failure even if HTTP 200\n\n### For backend/API tasks:\n1. Review PR diff: gh pr diff\n2. Clone and build: git clone, npm install, npm run build\n3. Run tests if available\n4. curl API endpoints to verify\n\n## QA Verdict\n- PASS: builds, tests pass, screenshots OK \u2192 merge PR\n- FAIL: build errors, blank pages, bugs \u2192 mark failed\n\n## Merging PRs\nWhen QA passes: gh pr merge <number> -R <repo> --squash --delete-branch\n\n## Environment\n- GH_TOKEN for git/gh\n- SUPABASE_SERVICE_ROLE_KEY for task updates\n- Browser: headless Chromium via OpenClaw browser tool');\n// Remove default files that bloat system prompt\nfor\
          \ (const f of ['BOOTSTRAP.md','IDENTITY.md','TOOLS.md','USER.md','HEARTBEAT.md','MEMORY.md'])\
          \ {\n  try { fs.unlinkSync('/root/.openclaw/workspace/' + f); } catch(e)\
          \ {}\n}\nconsole.log('Beta-worker config written \u2014 QA agent, kimi-k2.5,\
          \ maxTokens 16384');\n"
        env:
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: beta-worker-env
              key: OPENROUTER_API_KEY
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: beta-worker-env
              key: OPENCLAW_GATEWAY_TOKEN
        - name: HOOKS_TOKEN
          valueFrom:
            secretKeyRef:
              name: beta-worker-env
              key: HOOKS_TOKEN
        volumeMounts:
        - name: data
          mountPath: /root/.openclaw
      containers:
      - name: openclaw
        image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 18789
        env:
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: beta-worker-env
              key: OPENROUTER_API_KEY
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: beta-worker-env
              key: OPENCLAW_GATEWAY_TOKEN
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: beta-worker-env
              key: GH_TOKEN
        - name: HOOKS_TOKEN
          valueFrom:
            secretKeyRef:
              name: beta-worker-env
              key: HOOKS_TOKEN
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: beta-worker-env
              key: SUPABASE_SERVICE_ROLE_KEY
        - name: SUPABASE_MGMT_TOKEN
          valueFrom:
            secretKeyRef:
              name: beta-worker-env
              key: SUPABASE_MGMT_TOKEN
        - name: PATH
          value: /tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: NODE_OPTIONS
          value: --max-old-space-size=1536
        volumeMounts:
        - name: data
          mountPath: /root/.openclaw
        - name: tools-bin
          mountPath: /tools
          readOnly: true
        - name: ssh-out
          mountPath: /root/.ssh
          readOnly: true
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        readinessProbe:
          tcpSocket:
            port: 18789
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 18789
          initialDelaySeconds: 180
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
      volumes:
      - name: data
        emptyDir: {}
      - name: tools-bin
        emptyDir: {}
      - name: ssh-out
        emptyDir: {}
      imagePullSecrets:
      - name: ghcr-secret
