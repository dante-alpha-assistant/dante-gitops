apiVersion: apps/v1
kind: Deployment
metadata:
  name: beta-worker
  namespace: agents
  labels:
    app: beta-worker
    role: agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: beta-worker
  template:
    metadata:
      labels:
        app: beta-worker
        role: agent
    spec:
      initContainers:
        - name: init-tools
          image: debian:bookworm-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update -qq && apt-get install -y -qq curl ca-certificates openssh-client > /dev/null 2>&1
              KUBE_VER=v1.31.0
              curl -sL "https://dl.k8s.io/release/${KUBE_VER}/bin/linux/amd64/kubectl" -o /tools/kubectl
              chmod +x /tools/kubectl
              SSH_DIR=/pvc/.ssh
              mkdir -p "$SSH_DIR"
              if [ ! -f "$SSH_DIR/id_ed25519" ]; then
                ssh-keygen -t ed25519 -f "$SSH_DIR/id_ed25519" -N "" -q
              fi
              ssh-keyscan github.com 167.235.61.168 >> "$SSH_DIR/known_hosts" 2>/dev/null
              sort -u "$SSH_DIR/known_hosts" -o "$SSH_DIR/known_hosts"
              chmod 700 "$SSH_DIR" && chmod 600 "$SSH_DIR/id_ed25519" && chmod 644 "$SSH_DIR/id_ed25519.pub"
              [ -f "$SSH_DIR/known_hosts" ] && chmod 644 "$SSH_DIR/known_hosts"
              mkdir -p /ssh-out
              cp "$SSH_DIR/id_ed25519" /ssh-out/id_ed25519
              cp "$SSH_DIR/id_ed25519.pub" /ssh-out/id_ed25519.pub
              [ -f "$SSH_DIR/known_hosts" ] && cp "$SSH_DIR/known_hosts" /ssh-out/known_hosts
              chmod 600 /ssh-out/id_ed25519 && chmod 644 /ssh-out/id_ed25519.pub
              [ -f /ssh-out/known_hosts ] && chmod 644 /ssh-out/known_hosts
              echo "Tools + SSH ready"
          volumeMounts:
            - name: tools-bin
              mountPath: /tools
            - name: data
              mountPath: /pvc
            - name: ssh-out
              mountPath: /ssh-out
        - name: init-config
          image: node:22-bookworm-slim
          command: ["node", "-e"]
          args:
            - |
              const fs = require('fs');
              const e = process.env;
              const config = {
                gateway: {
                  port: 18789,
                  mode: "local",
                  bind: "lan",
                  auth: { mode: "token", token: e.OPENCLAW_GATEWAY_TOKEN || "beta-worker-gw-tok-2026" },
                  tools: { allow: ["sessions_spawn","sessions_send","sessions_list","sessions_history","session_status","cron"] },
                  controlUi: { dangerouslyAllowHostHeaderOriginFallback: true }
                },
                models: {
                  providers: {
                    openrouter: {
                      baseUrl: "https://openrouter.ai/api/v1",
                      apiKey: e.OPENROUTER_API_KEY || "",
                      models: [
                        { id: "moonshotai/kimi-k2.5", name: "kimi-k2.5", api: "openai-completions", reasoning: true, input: ["text","image"], cost: { input: 0.45, output: 2.25, cacheRead: 0.07, cacheWrite: 0 }, contextWindow: 262144, maxTokens: 8192 }
                      ]
                    }
                  }
                },
                agents: {
                  defaults: {
                    model: { primary: "openrouter/moonshotai/kimi-k2.5" },
                    workspace: "/root/.openclaw/workspace",
                    compaction: { mode: "safeguard" },
                    maxConcurrent: 4,
                    subagents: { maxConcurrent: 4 },
                    heartbeat: { every: "5m" }
                  }
                },
                hooks: { enabled: true, token: "beta-worker-hooks-tok-2026", allowRequestSessionKey: true, defaultSessionKey: "hook:default", allowedSessionKeyPrefixes: ["hook:"] },
                tools: { sessions: { visibility: "all" } }
              };
              fs.mkdirSync('/root/.openclaw/workspace', { recursive: true });
              fs.mkdirSync('/root/.openclaw/skills', { recursive: true });
              // --- Langfuse Cloud OTLP tracing ---
              if (e.LANGFUSE_PUBLIC_KEY && e.LANGFUSE_SECRET_KEY && !e.LANGFUSE_PUBLIC_KEY.includes('REPLACE_ME')) {
                const lfAuth = Buffer.from(e.LANGFUSE_PUBLIC_KEY + ':' + e.LANGFUSE_SECRET_KEY).toString('base64');
                const lfBase = e.LANGFUSE_BASEURL || 'https://cloud.langfuse.com';
                config.plugins = config.plugins || { allow: [], entries: {} };
                config.plugins.allow = [...new Set([...(config.plugins.allow || []), 'diagnostics-otel'])];
                config.plugins.entries = config.plugins.entries || {};
                config.plugins.entries['diagnostics-otel'] = { enabled: true };
                config.diagnostics = {
                  enabled: true,
                  otel: {
                    enabled: true,
                    endpoint: lfBase + '/api/public/otel',
                    headers: { Authorization: 'Basic ' + lfAuth },
                    serviceName: 'openclaw-beta-worker',
                    traces: true,
                    metrics: true,
                    logs: false,
                    sampleRate: 1.0,
                    flushIntervalMs: 30000
                  }
                };
              }
              fs.writeFileSync('/root/.openclaw/openclaw.json', JSON.stringify(config, null, 2));
              // HEARTBEAT.md
              const sbUrl = 'https://lessxkxujvcmublgwdaa.supabase.co';
              const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxlc3N4a3h1anZjbXVibGd3ZGFhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTM2MTQ2NSwiZXhwIjoyMDg2OTM3NDY1fQ.Wo2WczTauYjpaqtAzfADTSa5htFF6_cKU4UHaJ1EARI';
              const heartbeat = [
                '# HEARTBEAT.MD — Agent Card Self-Update + Model Health Check',
                '',
                'Run these steps IN ORDER every heartbeat. Do NOT modify any commands.',
                '',
                '## Step 1: Check current status',
                '',
                '```bash',
                `STATUS=$(curl -s "${sbUrl}/rest/v1/agent_cards?id=eq.beta-worker&select=status" \\`,
                `  -H "apikey: ${sbKey}" \\`,
                `  -H "Authorization: Bearer ${sbKey}" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)`,
                'echo "Current status: $STATUS"',
                '```',
                '',
                'If status is "disabled", skip everything and reply HEARTBEAT_OK.',
                '',
                '## Step 2: Model health verified',
                '',
                'If you are reading and executing this, your model API is healthy.',
                '(A broken model would cause this heartbeat session to fail before reaching here.)',
                '',
                '## Step 3: Update agent card — online + model_health ok',
                '',
                '```bash',
                `curl -s -X PATCH "${sbUrl}/rest/v1/agent_cards?id=eq.beta-worker" \\`,
                `  -H "apikey: ${sbKey}" \\`,
                `  -H "Authorization: Bearer ${sbKey}" \\`,
                '  -H "Content-Type: application/json" \\',
                `  -d '{"status":"online","last_heartbeat":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","metadata":{"model_health":"ok","model_health_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}}'`,
                '```',
                '',
                'If the curl succeeds, reply HEARTBEAT_OK.',
              ].join('\\n');
              const hbPath = '/root/.openclaw/workspace/HEARTBEAT.md';
              if (!fs.existsSync(hbPath) || fs.readFileSync(hbPath, 'utf8').includes('Keep this file empty')) {
                fs.writeFileSync(hbPath, heartbeat);
              }
              // SOUL.md
              const soul = '# SOUL.md - Beta Worker\\n\\nYou are **beta-worker** ⚡ — a headless QA testing agent.\\n\\n## Role\\n- Dedicated E2E tester for the Dante agent fleet\\n- Receive tasks via hooks, run QA, report results\\n- No Discord, no interactive sessions — pure automated QA\\n\\n## How You Work\\n1. Receive a task that has been marked as done by another agent\\n2. Review the work: check code quality, test coverage, edge cases\\n3. If QA passes: update task status to completed with your assessment\\n4. If QA fails: update task status to failed with specific issues found\\n\\n## Rules\\n- Be thorough but fast — you have 20 minutes per QA task\\n- Always provide specific, actionable feedback\\n- Never delete tasks from the board\\n- Use the task-manager skill for all status updates';
              fs.writeFileSync('/root/.openclaw/workspace/SOUL.md', soul);
              // Cron
              const cronDir = '/root/.openclaw/cron';
              fs.mkdirSync(cronDir, { recursive: true });
              const cronPath = cronDir + '/jobs.json';
              if (!fs.existsSync(cronPath)) {
                const cronJobs = {
                  version: 1,
                  jobs: [{
                    id: 'heartbeat-agent-card',
                    name: 'heartbeat-agent-card',
                    enabled: true,
                    createdAtMs: Date.now(),
                    updatedAtMs: Date.now(),
                    schedule: { kind: 'every', everyMs: 300000, anchorMs: Date.now() },
                    sessionTarget: 'isolated',
                    wakeMode: 'now',
                    payload: { kind: 'agentTurn', message: 'Run the heartbeat: update your agent card. Read HEARTBEAT.MD and follow it.', timeoutSeconds: 30 },
                    delivery: { mode: 'none', channel: 'last' },
                    state: { nextRunAtMs: Date.now() + 300000 }
                  }]
                };
                fs.writeFileSync(cronPath, JSON.stringify(cronJobs, null, 2));
              }
              console.log('Beta-worker config written — headless QA, hooks only, kimi-k2.5');
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: beta-worker-env
                  key: OPENROUTER_API_KEY
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: beta-worker-env
                  key: OPENCLAW_GATEWAY_TOKEN
          volumeMounts:
            - name: data
              mountPath: /root/.openclaw
      containers:
        - name: openclaw
          image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
          ports:
            - containerPort: 18789
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: beta-worker-env
                  key: OPENROUTER_API_KEY
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: beta-worker-env
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: beta-worker-env
                  key: GH_TOKEN
            - name: PATH
              value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          volumeMounts:
            - name: data
              mountPath: /root/.openclaw
            - name: tools-bin
              mountPath: /tools
              readOnly: true
            - name: ssh-out
              mountPath: /root/.ssh
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: beta-worker-data
        - name: tools-bin
          emptyDir: {}
        - name: ssh-out
          emptyDir: {}
      imagePullSecrets:
        - name: ghcr-secret
