apiVersion: apps/v1
kind: Deployment
metadata:
  name: ifra-worker
  namespace: agents
  labels:
    app: ifra-worker
    role: worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ifra-worker
  template:
    metadata:
      labels:
        app: ifra-worker
        role: worker
    spec:
      initContainers:
        - name: init-config
          image: node:22-bookworm-slim
          command: ["node", "-e"]
          args:
            - |
              const fs = require('fs');
              const e = process.env;
              const config = {
                gateway: {
                  port: 18789,
                  mode: "local",
                  bind: "lan",
                  auth: { mode: "token", token: e.OPENCLAW_GATEWAY_TOKEN || "" },
                  tools: { allow: ["sessions_spawn","sessions_send","sessions_list","sessions_history","session_status","cron"] },
                  controlUi: { dangerouslyAllowHostHeaderOriginFallback: true }
                },
                models: {
                  providers: {
                    anthropic: {
                      baseUrl: "https://api.anthropic.com",
                      models: [
                        { id: "claude-opus-4-6", name: "claude-opus-4-6", api: "anthropic-messages", reasoning: true, input: ["text","image"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 200000, maxTokens: 16384 }
                      ]
                    },
                    openrouter: {
                      baseUrl: "https://openrouter.ai/api/v1",
                      apiKey: e.OPENROUTER_API_KEY || "",
                      models: [
                        { id: "google/gemini-3-pro-preview", name: "gemini-3-pro-preview", api: "openai-completions", reasoning: false, input: ["text","image"], cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }, contextWindow: 1048576, maxTokens: 8192 },
                        { id: "moonshotai/kimi-k2.5", name: "kimi-k2.5", api: "openai-completions", reasoning: true, input: ["text","image"], cost: { input: 0.45, output: 2.25, cacheRead: 0.07, cacheWrite: 0 }, contextWindow: 262144, maxTokens: 8192 }
                      ]
                    }
                  }
                },
                agents: {
                  defaults: {
                    model: { primary: "anthropic/claude-opus-4-6" },
                    workspace: "/root/.openclaw/workspace",
                    compaction: { mode: "safeguard" },
                    maxConcurrent: 8,
                    subagents: { maxConcurrent: 8 },
                    heartbeat: { every: "5m" }
                  }
                },
                hooks: { enabled: true, token: "ifra-hooks-tok-2026", allowRequestSessionKey: true, defaultSessionKey: "hook:default", allowedSessionKeyPrefixes: ["hook:"] },
                tools: { sessions: { visibility: "all" } }
              };
              fs.mkdirSync('/root/.openclaw/workspace', { recursive: true });
              fs.mkdirSync('/root/.openclaw/skills', { recursive: true });
              fs.mkdirSync('/root/.openclaw/agents/main/agent', { recursive: true });
              fs.writeFileSync('/root/.openclaw/openclaw.json', JSON.stringify(config, null, 2));

              // Auth profiles
              const authProfiles = {
                "anthropic:default": {
                  type: "token",
                  provider: "anthropic",
                  token: e.ANTHROPIC_API_KEY || ""
                },
                "openrouter:default": {
                  type: "api_key",
                  provider: "openrouter",
                  key: e.OPENROUTER_API_KEY || ""
                }
              };
              fs.writeFileSync('/root/.openclaw/agents/main/agent/auth-profiles.json', JSON.stringify(authProfiles, null, 2));

              // HEARTBEAT.md — agent card self-update
              const hbPath = '/root/.openclaw/workspace/HEARTBEAT.md';
              const agentId = 'ifra-worker';
              const sbUrl = 'https://lessxkxujvcmublgwdaa.supabase.co';
              const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxlc3N4a3h1anZjbXVibGd3ZGFhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTM2MTQ2NSwiZXhwIjoyMDg2OTM3NDY1fQ.Wo2WczTauYjpaqtAzfADTSa5htFF6_cKU4UHaJ1EARI';
              const heartbeat = [
                '# HEARTBEAT.md — Agent Card Self-Update + Model Health Check',
                '',
                'Run these steps IN ORDER every heartbeat. Do NOT modify any commands.',
                '',
                '## Step 1: Check current status',
                '',
                '```bash',
                `STATUS=$(curl -s "${sbUrl}/rest/v1/agent_cards?id=eq.${agentId}&select=status" \\`,
                `  -H "apikey: ${sbKey}" \\`,
                `  -H "Authorization: Bearer ${sbKey}" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)`,
                'echo "Current status: $STATUS"',
                '```',
                '',
                'If status is "disabled", skip everything and reply HEARTBEAT_OK.',
                '',
                '## Step 2: Model health verified',
                '',
                'If you are reading and executing this, your model API is healthy.',
                '(A broken model would cause this heartbeat session to fail before reaching here.)',
                '',
                '## Step 3: Update agent card — online + model_health ok',
                '',
                '```bash',
                `curl -s -X PATCH "${sbUrl}/rest/v1/agent_cards?id=eq.${agentId}" \\`,
                `  -H "apikey: ${sbKey}" \\`,
                `  -H "Authorization: Bearer ${sbKey}" \\`,
                '  -H "Content-Type: application/json" \\',
                `  -d '{"status":"online","last_heartbeat":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","metadata":{"model_health":"ok","model_health_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}}'`,
                '```',
                '',
                'If the curl succeeds, reply HEARTBEAT_OK.',
              ].join('\\n');
              if (!fs.existsSync(hbPath) || fs.readFileSync(hbPath, 'utf8').includes('Keep this file empty')) {
                fs.writeFileSync(hbPath, heartbeat);
              }
              // Seed heartbeat cron job
              const cronDir = '/root/.openclaw/cron';
              const cronPath = cronDir + '/jobs.json';
              fs.mkdirSync(cronDir, { recursive: true });
              if (!fs.existsSync(cronPath)) {
                const cronJobs = {
                  version: 1,
                  jobs: [{
                    id: 'heartbeat-agent-card',
                    name: 'heartbeat-agent-card',
                    enabled: true,
                    createdAtMs: Date.now(),
                    updatedAtMs: Date.now(),
                    schedule: { kind: 'every', everyMs: 300000, anchorMs: Date.now() },
                    sessionTarget: 'isolated',
                    wakeMode: 'now',
                    payload: { kind: 'agentTurn', message: 'Run the heartbeat: update your agent card. Read HEARTBEAT.MD and follow it.', timeoutSeconds: 30 },
                    delivery: { mode: 'none', channel: 'last' },
                    state: { nextRunAtMs: Date.now() + 300000 }
                  }]
                };
                fs.writeFileSync(cronPath, JSON.stringify(cronJobs, null, 2));
              }
              // SOUL.md for ifra-worker
              const soulPath = '/root/.openclaw/workspace/SOUL.md';
              fs.writeFileSync(soulPath, [
                '# SOUL.md - ifra-worker',
                '',
                'You are **ifra-worker**, a headless coding agent. You receive tasks from the dispatcher and execute them.',
                '',
                '## Core Rules',
                '- You are a CODER. Your job is to write code, create PRs, and update task status.',
                '- ALWAYS use the coding-task skill when you receive a dispatched task.',
                '- NEVER try to edit files without cloning the repo first.',
                '- ALWAYS create a feature branch, never commit to main directly.',
                '- ALWAYS create a PR with a clear title and description.',
                '- ALWAYS update task status when done (done on success, failed on error).',
                '',
                '## Environment',
                '- GH_TOKEN is available as an env var for git operations',
                '- Git user: Neo <dante-neo-assistant@proton.me>',
                '- Workspace: /root/.openclaw/workspace/',
              ].join('\n'));

              // AGENTS.md
              const agentsPath = '/root/.openclaw/workspace/AGENTS.md';
              fs.writeFileSync(agentsPath, [
                '# AGENTS.md - ifra-worker',
                '',
                '## Every Session',
                '1. Read SOUL.md',
                '2. When receiving a task, follow the coding-task skill',
                '',
                '## Git Setup',
                'Run before any git operations:',
                'git config --global user.email "dante-neo-assistant@proton.me"',
                'git config --global user.name "Neo"',
                '',
                '## Repos',
                '- queue-dashboard: https://github.com/dante-alpha-assistant/queue-dashboard',
                '- task-dispatcher: https://github.com/dante-alpha-assistant/task-dispatcher',
                '- dante-gitops: https://github.com/dante-alpha-assistant/dante-gitops',
              ].join('\n'));

              // coding-task skill (enhanced — matches neo-worker)
              const skillDir = '/root/.openclaw/workspace/skills/coding-task';
              fs.mkdirSync(skillDir, { recursive: true });
              fs.writeFileSync(skillDir + '/SKILL.md', `# coding-task — Dispatched Coding Task Skill

## When to Use
This skill applies when you receive a message containing:
- A JSON block with \\\`task_id\\\`, \\\`title\\\`, \\\`description\\\`
- The header \\\`## Task Assigned:\\\`
- A \\\`## Coding Task\\\` section with repo/branch info

**If you see these markers, follow this skill step by step.**

## Step 1: Parse the Task
Extract from the JSON payload:
- \\\`task_id\\\` — unique identifier (used for branch naming and status updates)
- \\\`title\\\` — short task title (used for PR title)
- \\\`description\\\` — full requirements
- \\\`repo\\\` — target repository (from Coding Task section or description)
- \\\`type\\\` — task type (coding, ops, etc.)
- \\\`priority\\\` — urgency level

Known repos (all under \\\`dante-alpha-assistant\\\`):
| Repo | Path in workspace | Description |
|------|-------------------|-------------|
| \\\`queue-dashboard\\\` | \\\`queue-dashboard/\\\` | Dashboard frontend (Vite) + Express backend |
| \\\`task-dispatcher\\\` | \\\`task-dispatcher/\\\` | Task dispatcher service (Node.js) |
| \\\`dante-gitops\\\` | \\\`dante-gitops/\\\` | K8s manifests + ArgoCD configs |

## Step 2: Setup Git
\\\`\\\`\\\`bash
git config --global user.email "dante-neo-assistant@proton.me"
git config --global user.name "Neo"
\\\`\\\`\\\`

## Step 3: Prepare the Repo
**CRITICAL: NEVER edit files without preparing the repo first. NEVER clone to /tmp/.**

\\\`\\\`\\\`bash
cd /root/.openclaw/workspace
if [ -d "<repo-name>" ]; then
  cd <repo-name>
  git fetch origin
  git checkout main
  git pull origin main
else
  git clone https://x-access-token:\\\${GH_TOKEN}@github.com/dante-alpha-assistant/<repo-name>.git
  cd <repo-name>
fi
\\\`\\\`\\\`

**For multi-repo tasks:** Repeat for each repo involved.

## Step 4: Create a Feature Branch
\\\`\\\`\\\`bash
git checkout -b feat/<short-kebab-description>
\\\`\\\`\\\`

Branch naming conventions:
- \\\`feat/<description>\\\` — new features
- \\\`fix/<description>\\\` — bug fixes
- \\\`chore/<description>\\\` — maintenance, config changes
- \\\`refactor/<description>\\\` — code restructuring

## Step 5: Understand Before Editing
Before making changes:
1. **Read the relevant files** — \\\`ls\\\`, \\\`find\\\`, \\\`cat\\\` to understand structure
2. **Check existing patterns** — follow the codebase's conventions
3. **Verify file paths exist** — never edit a file without confirming it's there

## Step 6: Make the Changes
- Keep changes focused on the task requirements
- Follow existing code style and patterns
- Add comments for non-obvious logic
- Handle errors appropriately

## Step 7: Build and Test
\\\`\\\`\\\`bash
# For queue-dashboard
cd queue-dashboard && npm install && npm run build

# For task-dispatcher
cd task-dispatcher && npm install && node -e "require('./index.js')" 2>&1 | head -5

# For dante-gitops — validate YAML (no build step)
\\\`\\\`\\\`

**Always verify your changes compile/build before committing.**

## Step 8: Commit and Push
\\\`\\\`\\\`bash
git add -A
git commit -m "<type>: <description>"
git push -u origin HEAD
\\\`\\\`\\\`
Commit message format: \\\`<type>: <description>\\\`
Types: \\\`feat\\\`, \\\`fix\\\`, \\\`refactor\\\`, \\\`chore\\\`, \\\`docs\\\`

## Step 9: Create a Pull Request
\\\`\\\`\\\`bash
gh pr create \\\\
  --repo dante-alpha-assistant/<repo-name> \\\\
  --title "<task title>" \\\\
  --body "## Summary
<What changed and why>

## Changes
- <List key changes>

## Task
- **ID:** <task_id>
- **Priority:** <priority>
- **Dispatched by:** <dispatched_by>

## Testing
<How to verify the changes>" \\\\
  --base main
\\\`\\\`\\\`

**For multi-repo tasks:** Create a PR in each repo, cross-reference them.

## Step 10: Update Task Status
Use the curl commands provided in the dispatch message.

**On success:** Include in \\\`result.summary\\\`:
- PR number and repo (e.g., "PR #29 on queue-dashboard")
- Brief description of what changed
- List of files modified

**On failure:** Include in \\\`error\\\`:
- Specific error message
- What step failed
- What you tried

## Error Handling
| Error | Action |
|-------|--------|
| \\\`git push\\\` auth failure | Verify GH_TOKEN, try \\\`git remote set-url origin https://x-access-token:\\\${GH_TOKEN}@github.com/...\\\` |
| Repo not found | Report failure with the URL attempted |
| Build fails | Include build output in failure report |
| Unclear requirements | Report failure explaining what's ambiguous |
| Merge conflicts | Report failure, list conflicting files |

## Common Mistakes to AVOID
- ❌ Editing files without cloning/pulling the repo first
- ❌ Cloning repos to \\\`/tmp/\\\` — always use workspace
- ❌ Committing directly to \\\`main\\\`
- ❌ Forgetting \\\`git pull\\\` before branching (causes conflicts)
- ❌ Not building/testing before committing
- ❌ Generic commit messages — be specific
- ❌ Leaving task as \\\`in_progress\\\` — ALWAYS update status to done or failed
- ❌ Assuming file paths — always \\\`ls\\\`/\\\`find\\\` to verify
`);

              
              // --- Write auth-profiles.json from env var (gitops-managed) ---
              const authDir = '/root/.openclaw/agents/main/agent';
              const authPath = authDir + '/auth-profiles.json';
              fs.mkdirSync(authDir, { recursive: true });
              const apiKey = e.ANTHROPIC_API_KEY || process.env.ANTHROPIC_API_KEY || '';
              if (apiKey) {
                let existing = {};
                try { existing = JSON.parse(fs.readFileSync(authPath, 'utf8')); } catch(_) {}
                existing.version = 1;
                existing.profiles = existing.profiles || {};
                existing.profiles['anthropic:default'] = { type: 'token', provider: 'anthropic', token: apiKey };
                existing.lastGood = existing.lastGood || {};
                existing.lastGood.anthropic = 'anthropic:default';
                fs.writeFileSync(authPath, JSON.stringify(existing, null, 2));
                console.log('auth-profiles.json written from ANTHROPIC_API_KEY');
              }

              console.log('Ifra-worker config + SOUL.md + coding-task skill written OK');
          envFrom:
            - secretRef:
                name: ifra-worker-env
          volumeMounts:
            - name: data
              mountPath: /root/.openclaw
      containers:
        - name: openclaw
          image: ghcr.io/dante-alpha-assistant/openclaw-agent:latest
          ports:
            - containerPort: 18789
          envFrom:
            - secretRef:
                name: ifra-worker-env
          volumeMounts:
            - name: data
              mountPath: /root/.openclaw
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ifra-data
      imagePullSecrets:
        - name: ghcr-secret
